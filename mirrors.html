<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirrors of Wilaya</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #100e08;
    --paper: #e8e0d0;
    --rust: #c4400a;
    --sage: #3d5c35;
    --gold: #c9962a;
    --dust: #9e8f72;
    --cream: #f2ead8;
    --deep: #1a160e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
    pointer-events:none; z-index:1000; opacity:0.5; mix-blend-mode: overlay;
  }
  header {
    padding: 3.5rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid #2e2618;
    background: linear-gradient(to bottom, #0a0804, var(--ink));
  }
  .header-rule { color: var(--rust); font-size: 0.7rem; letter-spacing: 1rem; margin-bottom: 1.2rem; display: block; }
  h1 { font-family: 'IM Fell English', serif; font-size: clamp(1.8rem, 4vw, 2.8rem); color: var(--paper); line-height: 1; letter-spacing: 0.06em; }
  .subtitle { font-size: 0.75rem; letter-spacing: 0.3em; color: var(--dust); margin-top: 0.6rem; text-transform: uppercase; }
  .header-rule-bottom { color: var(--gold); font-size: 0.65rem; letter-spacing: 0.6rem; margin-top: 1.2rem; display: block; }

  /* DRAW ZONE */
  .draw-zone {
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid #1e1a10;
  }
  .draw-label { font-size: 0.72rem; letter-spacing: 0.3em; color: var(--dust); text-transform: uppercase; }
  .draw-controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .draw-count { display: flex; gap: 0.3rem; }
  .count-btn {
    width: 2.2rem; height: 2.2rem;
    border: 1px solid #3a3020; background: none; color: var(--dust);
    font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s;
  }
  .count-btn:hover, .count-btn.active { background: var(--rust); border-color: var(--rust); color: var(--cream); }
  .draw-btn {
    background: none; border: 1px solid var(--gold); color: var(--gold);
    font-family: 'Space Mono', monospace; font-size: 0.78rem; letter-spacing: 0.2em;
    padding: 0.7rem 2rem; cursor: pointer; text-transform: uppercase; transition: all 0.25s;
    position: relative; overflow: hidden;
  }
  .draw-btn::before {
    content: ''; position: absolute; inset: 0; background: var(--gold);
    transform: translateX(-100%); transition: transform 0.3s ease; z-index: -1;
  }
  .draw-btn:hover { color: var(--ink); }
  .draw-btn:hover::before { transform: translateX(0); }

  /* SPREAD */
  .spread-zone { display: none; padding: 2rem; border-bottom: 2px solid var(--rust); background: #0c0a06; }
  .spread-zone.visible { display: block; }
  .spread-title { font-size: 0.72rem; letter-spacing: 0.3em; color: var(--rust); text-transform: uppercase; text-align: center; margin-bottom: 1.5rem; }
  .spread-grid { display: flex; flex-wrap: wrap; gap: 1.2rem; justify-content: center; }
  .spread-card { width: 130px; cursor: pointer; animation: riseIn 0.5s ease both; }
  @keyframes riseIn { from { opacity:0; transform: translateY(20px) rotate(-2deg); } to { opacity:1; transform: translateY(0) rotate(0); } }
  .spread-card-img { width: 100%; padding-bottom: 158.3%; position: relative; border: 1px solid var(--dust); background: var(--deep); overflow: hidden; }
  .spread-card-img img { position: absolute; inset:0; width:100%; height:100%; object-fit: cover; filter: contrast(1.05) saturate(0.8); }
  .spread-card-ph {
    position: absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size: 2.5rem; color: var(--dust);
    background: repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(180,160,120,0.07) 4px,rgba(180,160,120,0.07) 8px);
  }
  .spread-card-name { font-family: 'IM Fell English', serif; font-size: 0.8rem; color: var(--paper); text-align: center; margin-top: 0.4rem; line-height: 1.3; }
  .spread-card-suit { font-size: 0.58rem; color: var(--gold); text-align: center; letter-spacing: 0.1em; text-transform: uppercase; }
  .clear-spread {
    display: block; margin: 1.5rem auto 0;
    background: none; border: 1px solid #3a3020; color: var(--dust);
    font-family: 'Space Mono', monospace; font-size: 0.68rem; letter-spacing: 0.2em;
    padding: 0.4rem 1.2rem; cursor: pointer; text-transform: uppercase; transition: all 0.2s;
  }
  .clear-spread:hover { border-color: var(--rust); color: var(--rust); }

  /* SUIT NAV */
  .suit-nav { display: flex; gap: 0.3rem; justify-content: center; flex-wrap: wrap; padding: 1.5rem 2rem; border-bottom: 1px solid #1e1a10; }
  .suit-btn {
    background: none; border: 1px solid #3a3020; color: var(--dust);
    font-family: 'Space Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em;
    padding: 0.4rem 0.9rem; cursor: pointer; text-transform: uppercase; transition: all 0.2s;
  }
  .suit-btn:hover, .suit-btn.active { background: var(--rust); border-color: var(--rust); color: var(--cream); }

  /* DECK */
  .deck { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 1.4rem; padding: 2.5rem 2rem; max-width: 1300px; margin: 0 auto; }
  .card-wrap { perspective: 1000px; cursor: pointer; animation: fadeUp 0.4s ease both; }
  .card-wrap.hidden { display: none; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
  .card-inner { position: relative; width:100%; padding-bottom: 158.3%; transform-style: preserve-3d; transition: transform 0.65s cubic-bezier(0.23,1,0.32,1); }
  .card-wrap:hover .card-inner { transform: rotateY(180deg); }
  .card-face, .card-back { position: absolute; inset:0; backface-visibility: hidden; border: 1px solid #3a3020; }
  .card-face { background: #0d0b07; display: flex; flex-direction: column; overflow: hidden; }
  .card-image { flex:1; position: relative; background: #141008; overflow: hidden; }
  .card-image img { width:100%; height:100%; object-fit:cover; display:block; filter: contrast(1.08) saturate(0.82); }
  .card-image .ph {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-size: 2.8rem; color: #3a3020;
    background: repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(100,80,40,0.1) 5px,rgba(100,80,40,0.1) 10px);
  }
  .card-label { padding: 0.55rem 0.5rem 0.6rem; background: #0a0804; text-align: center; border-top: 1px solid #2a2010; }
  .card-number { font-size: 0.6rem; color:var(--rust); letter-spacing:0.2em; display:block; }
  .card-title { font-family:'IM Fell English',serif; font-size: 0.88rem; color:var(--paper); line-height:1.2; display:block; margin-top:0.1rem; }
  .card-suit { font-size: 0.58rem; color:var(--gold); letter-spacing:0.12em; text-transform:uppercase; margin-top:0.15rem; display:block; }
  .card-back { background: #0a0804; transform: rotateY(180deg); display:flex; flex-direction:column; padding:0.9rem 0.8rem; border-color: var(--rust); }
  .back-title { font-family:'IM Fell English',serif; font-size: 1rem; color:var(--gold); border-bottom:1px solid #3a1a08; padding-bottom:0.45rem; margin-bottom:0.6rem; line-height:1.2; }
  .back-text { font-size: 0.65rem; line-height:1.75; color:var(--dust); flex:1; overflow:hidden; }
  .back-read { display:block; margin-top:0.6rem; font-size: 0.6rem; color:var(--rust); text-decoration:none; letter-spacing:0.1em; border-top:1px solid #2a1a08; padding-top:0.45rem; text-align:right; }
  .back-read:hover { color:var(--gold); }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(5,4,2,0.94); z-index:500; align-items:center; justify-content:center; padding:1.5rem; }
  .modal-overlay.open { display:flex; }
  .modal { background: var(--deep); border: 1px solid var(--dust); max-width: 720px; width:100%; max-height:88vh; overflow-y:auto; display:grid; grid-template-columns: 200px 1fr; position:relative; }
  @media(max-width:560px){ .modal { grid-template-columns:1fr; } .modal-img { min-height:220px; max-height:317px; } }
  .modal-img { background:#0a0804; position:relative; overflow:hidden; min-height:317px; }
  .modal-img img { width:100%; height:100%; object-fit:cover; filter:contrast(1.06) saturate(0.82); }
  .modal-img .ph { width:100%; height:100%; min-height:317px; display:flex; align-items:center; justify-content:center; font-size:4rem; color:#3a3020; }
  .modal-body { padding:1.8rem 1.6rem; display:flex; flex-direction:column; gap:0.9rem; }
  .modal-meta { font-size: 0.65rem; color:var(--rust); letter-spacing:0.25em; text-transform:uppercase; }
  .modal-title { font-family:'IM Fell English',serif; font-size: 1.5rem; color:var(--paper); line-height:1.1; }
  .modal-suit-tag { display:inline-block; background:var(--sage); color:var(--cream); font-size: 0.6rem; letter-spacing:0.15em; text-transform:uppercase; padding:0.2rem 0.6rem; }
  .modal-archetype { font-size: 0.72rem; color:var(--gold); font-style:italic; border-left:2px solid var(--rust); padding-left:0.7rem; line-height:1.6; }
  .modal-description { font-size: 0.78rem; line-height:1.9; color: #b8a98a; border-top:1px solid #1e1a10; padding-top:0.9rem; white-space:pre-wrap; }
  .modal-links { display:flex; gap:1rem; flex-wrap:wrap; margin-top:auto; padding-top:0.9rem; border-top:1px solid #1e1a10; }
  .modal-links a { font-size: 0.65rem; color:var(--rust); text-decoration:none; letter-spacing:0.1em; text-transform:uppercase; transition:color 0.2s; }
  .modal-links a:hover { color:var(--gold); }
  .close-btn { position:absolute; top:0.7rem; right:0.8rem; background:none; border:none; color:var(--dust); font-size:1.1rem; cursor:pointer; z-index:10; font-family:'Space Mono',monospace; }
  .close-btn:hover { color:var(--rust); }
  footer { text-align:center; padding:2.5rem 2rem; font-size: 0.65rem; color:#3a3020; letter-spacing:0.2em; border-top:1px solid #1e1a10; }
</style>
</head>
<body>

<header>
  <span class="header-rule">◈ ◈ ◈</span>
  <h1>Mirrors of Wilaya</h1>
  <p class="subtitle">A Reclamation &nbsp;·&nbsp; Alataria</p>
  <span class="header-rule-bottom">✦ ✦ ✦</span>
</header>

<section class="draw-zone">
  <span class="draw-label">Draw a spread</span>
  <div class="draw-controls">
    <div class="draw-count" id="countBtns">
      <button class="count-btn active" data-n="1">1</button>
      <button class="count-btn" data-n="3">3</button>
      <button class="count-btn" data-n="5">5</button>
      <button class="count-btn" data-n="7">7</button>
      <button class="count-btn" data-n="9">9</button>
    </div>
    <button class="draw-btn" id="drawBtn">✦ Draw Cards</button>
  </div>
</section>

<section class="spread-zone" id="spreadZone">
  <p class="spread-title" id="spreadTitle"></p>
  <div class="spread-grid" id="spreadGrid"></div>
  <button class="clear-spread" id="clearSpread">✕ Clear spread</button>
</section>

<nav class="suit-nav" id="suitNav">
  <button class="suit-btn active" data-suit="all">All</button>
</nav>

      <div class="modal-meta" id="modalMeta"></div>

      <span class="modal-suit-tag" id="modalSuit"></span>
      <p class="modal-archetype" id="modalArchetype"></p>
      <p class="modal-description" id="modalDesc"></p>
      <div class="modal-links" id="modalLinks"></div>
    </div>
  </div>
</div>

<footer>hover to glimpse &nbsp;·&nbsp; click to enter &nbsp;·&nbsp; ◈ mirrors of wilaya</footer>

<script>
const SUITS = [
  "AYAT — SIGNS",
  "QALB — HEART",
  "QAWL — WORDS",
  "NAAR — FIRE",
  "ARD — MATERIAL",
];

const CARDS = [
  { id:"fitra", number:"0", suit:"AYAT — SIGNS", title:"FITRA — Primordial Nature",
    archetype:"Beginnings, radical trust, clarity before conditioning.",
    description:`Fitra is the face you had before your parents were born. Before the names, there was an original yes—the covenant made when all was still light moving across dark waters. We are waves that forgot we are ocean; peaks rising in a single mirror, catching glow and calling it "mine", lifting into separateness and calling this birth, never recognizing it is water itself playing at boundaries.

Abyss and witness share the same substance — not innocence but pre-innocence—clarity that comes before experience teaches doubt. The mystics call it sirr, the untranslatable thread. The wise call it ma'rifa, knowing that predates all teachers. Trust here is not belief despite evidence — it is the wave's fluency with falling, light's ease with scattering. What looks foolish is refusal to forget the first language, spoken when breath moved across void and said let there be.

You do not find this nature. You stop obscuring it. The journey begins when the reflection recognizes the face of the deep in its own flickering surface, and the deep reaches through.`,
    image:"https://substackcdn.com/image/fetch/$s_!Jmqf!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F60f864af-f38e-47c2-8185-ffd99ca5f43d_1200x1200.jpeg", substack:"", behance:"" },

  { id:"nubuwwa", number:"I", suit:"AYAT — SIGNS", title:"NUBUWWA — Revelation",
    archetype:"The prophetic channel, transmission between worlds, the word that reorganizes everything it touches.",
    description:`Something came through.
Not from within — from beyond, through a vessel prepared without knowing it was being prepared. The message did not belong to the one who carried it. It passed through and kept moving — through lineage, through interpretation, through every generation willing to receive what the last one preserved.

This is the original transmission: above reaching below, the Real speaking to what it made in a language exactly fitted to what could be heard. All elements addressed. Nothing of human or other life left outside it.

The channel does not close when the messenger returns to God. It continues through those designated to carry what was carried — the living chain, the unbroken line, the inheritance that is also a responsibility.

You do not encounter revelation once. You encounter it at the level of your capacity to receive, and capacity deepens.

The word was sent. It is still arriving.`,
    image:"https://substackcdn.com/image/fetch/$s_!00wh!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Faeb47433-ee4d-4a14-99fd-454e907cc787_1200x1200.jpeg", substack:"", behance:"" },

  { id:"zahra", number:"II", suit:"AYAT — SIGNS", title:"ZAHRA — Flowering",
    archetype:"Inner knowing, sacred intuition, hidden wisdom, sovereign abundance.",
    description:`Some knowledge cannot be shouted because it must survive in smaller circles. Zahra is wisdom carried through bodies and generations of tears. Truth passes to those who remember what power demands be forgotten. Grief here is not emptiness but guardianship.

The veil is not disappearance but sovereignty — the right to an interior world untouched by the spectacle of playing to limited perception. Unveiling becomes weaponry against falsehood, letting revelations serve justice and memory alike. Flowering is endurance: light kept alive by divine command, not control.

History mistakes quiet for surrender, but dignity outlives thrones. Grief becomes inheritance; patience becomes doctrine; lineage carries resistance forward until its hour arrives. Some revolutions rise with banners. Others grow in homes where mothers refuse to let truth die.

You do not discover this knowing. You protect it.`,
    image:"https://substackcdn.com/image/fetch/$s_!1IWR!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F7e47b860-d024-4db5-912c-623cafcd870e_1200x1200.jpeg", substack:"", behance:"" },

  { id:"kubra", number:"III", suit:"AYAT — SIGNS", title:"KUBRA — Foremost",
    archetype:"Sacred recognition, the abundance that makes everything possible, the one who sees first and gives everything.",
    description:`Some see clearly before the world has caught up. Not because they were told what to look for — because their heart was already calibrated to the Real before the Real announced itself. This is the foremost quality: not precedence in time but precision of recognition. To see what is true and stake everything on that sight before anyone else has opened their eyes.

She did not follow. She recognized. The distinction is the whole card.

Abundance here is not wealth — it is what the earth does. It grows because that is its nature, shelters because that is its nature, gives before there is any institution to give to because the giving precedes the need. The material and the sacred are not in tension in this archetype. They are the same substance.

What she held became what held everything else. The first home the revolution ever had.

Foremost — not a rank assigned. A nature revealed.`,
    image:"https://substackcdn.com/image/fetch/$s_!kQce!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fa24f6422-7056-4d2f-8331-b9b1ef1270fb_1200x1200.jpeg", substack:"", behance:"" },

  { id:"amir", number:"IV", suit:"AYAT — SIGNS", title:"AMIR — Commander",
    archetype:"Structure, authority, responsibility.",
    description:`Authority is a structure; does it shelter or cage? The Commander sets the table last for himself when his people hunger. Light at the center does not command darkness — it refuses the extinguishment of color, allows for life as duty. Power is loan, justice is foundation. Without the second, the first collapses inward. You do not hold authority — it holds you accountable. What came out of the circumambulated?

The crown weighs heaviest on the head that remembers the pledges of outstretched hands, the soft bellies beneath hearts, the crushed ribs.`,
    image:"https://substackcdn.com/image/fetch/$s_!jrh2!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F8e8b1081-de4d-46e3-9c34-2049c2dbbf2f_1200x1200.jpeg", substack:"", behance:"" },

  { id:"muntadhir", number:"IX", suit:"AYAT — SIGNS", title:"MUNTADHIR — Awaited",
    archetype:"The sacred vigil, longing as loyalty, the one who is hidden and the ones who keep the light.",
    description:`He is not absent. He is hidden — which is a different condition entirely. The ocean does not stop being the ocean because you cannot see its limits.

The occultation is not abandonment. It is the longest trust ever extended — the belief that the world will become worthy of what it is waiting for, or that those who wait will become worthy of recognizing him when he comes. Both require the same thing: that you do not stop.

Muntadhir is the state of the one who lives as if the arrival is real. Who builds as if justice will have somewhere to land. Who refuses to normalize the world's cruelty because they know it is not the final arrangement.

He sees. This is what the tradition says — that he knows his people, grieves their grief, carries their names.

The candle is not lit for nothing. Someone is coming who will recognize what it cost to keep it burning.`,
    image:"https://substackcdn.com/image/fetch/$s_!rv-l!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F5ab562e6-fe15-47b1-af6a-3a9f14defdc3_1200x1200.jpeg", substack:"", behance:"" },

  { id:"barzakh", number:"XIII", suit:"AYAT — SIGNS", title:"BARZAKH — Threshold",
    archetype:"The interval, the luminous between, what persists when the form is released.",
    description:`There is a place that is not absence.
Between the last breath and the first light of what comes after — a realm that is the fullness of both held in suspension. Dwelling. The soul that has crossed does not disappear into silence. It inhabits a proximity the living can almost feel, especially in the hours before dawn, especially in the month when the veils thin.

What is most itself does not diminish at the threshold. It clarifies.

The mystics say the Barzakh of the luminous ones is not darkness but a light the living eye cannot yet calibrate to. Presence continuing in a register just beyond the reach of ordinary perception — felt in the hour of Fajr, in the sudden stillness, in the moment before the call when something ancient moves through the air.

You have loved people who are there now. They are not far.

The threshold is not a wall. It is a membrane — and what was most real about those who crossed it presses gently, continuously, toward you still.

The door does not close. It opens differently.`,
    image:"https://substackcdn.com/image/fetch/$s_!BPyf!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Feb0494c8-eff2-45c9-b604-dfbb4f1986e9_1200x1200.jpeg", substack:"", behance:"" },

  { id:"nafs", number:"XV", suit:"AYAT — SIGNS", title:"NAFS — Enemy",
    archetype:"The lower self, the commanding desire, the interior adversary that must be known before it can be crossed.",
    description:` Nafs Amarra. The most dangerous enemy speaks in your own voice, through marionetting your body and twisting your tongue to fashion its desires. 
It knows your justifications before you make them. It shaped your blind spots. It has been present at every moment of compromise and called each one reasonable, necessary, deserved. It does not tempt from outside — it uses the inside arsenal you forgot. It knew every one of your ancestors too.
Every tradition names this. The commanding self. The ego that mistakes its hunger for truth. The part that would rather be comfortable than honest, rather be right than transformed, rather maintain the familiar cage than face the open unknown. 
This is not self-hatred. The nafs is not the enemy because it is evil — it is the enemy because it is convincing. Because it wears your face. Because loving yourself correctly requires first seeing clearly what in you is not yet aligned with what you claim to believe.
The path through is not punishment. It is witness. To see the nafs operating is already to have created distance from it. The self that watches is not the self that commands.
You cannot defeat what you refuse to name. You cannot cross what you pretend is not there.
The first jihad is interior.
Know your enemy. It knows you.`,
    image:"http://substackcdn.com/image/fetch/$s_!PvPN!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Ff2b686a0-3d90-4213-b6a8-df6feef3e18a_1200x1200.jpeg", substack:"", behance:"" },


  { id:"nur", number:"XIX", suit:"AYAT — SIGNS", title:"NUR — Radiance",
    archetype:"Illumination, joy, the light that was before light.",
    description:`Before the first vessel there was this — the light that things are made of, not the light that falls on them.
You recognize it when you encounter it. Not because you were told what to look for. Because something in you was made of the same substance.

Joy here is not happiness. It is the creature's response to the light it came from — the sudden recognition of what was always present, what moved through the particular without being diminished by it, what will continue after every vessel returns.

You are not looking for it. You are standing in it.

The center holds. Everything else is how far the light travels.`,
    image:"https://substackcdn.com/image/fetch/$s_!yiYX!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fe3434f5a-fdc6-4eed-bdaf-fbf083e2f4b3_1200x1200.jpeg", substack:"", behance:"" },

  { id:"qiyama", number:"XX", suit:"AYAT — SIGNS", title:"QIYAMA — Rising",
    archetype:"Judgement, resurrection, the final accounting that was always coming.",
    description:`Everything that was buried rises. Everything that was silenced speaks. Everything taken is weighed on a scale that cannot be falsified.

This is not punishment. This is clarity at the scale of everything — the moment the gap between what was and what was claimed finally closes. The oppressor and the oppressed stand in the same light. The light does not negotiate.

Qiyama is personal, cosmic, and political simultaneously because justice at any scale is the same justice.

The body. The land. The name. The truth buried under whoever held the pen. All of it rises. All of it is counted.

The trumpet has not yet sounded. But what you have built in the dark will stand or fall in that light exactly as it is.`,
    image:"https://substackcdn.com/image/fetch/$s_!lzer!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F4713e354-b820-4412-aa8f-bc30d0b4bb5f_1200x1200.jpeg", substack:"", behance:"" },

  { id:"tawhid", number:"XXI", suit:"AYAT — SIGNS", title:"TAWHID — Unity",
    archetype:"Completion, wholeness, integration.",
    description:`All journeys ultimately return to unity — recognizing the One behind all multiplicity. Chapter 112.`,
    image:"https://substackcdn.com/image/fetch/$s_!iV96!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F8f715e94-1956-43bd-bdb0-68b42dea26c5_1200x1200.jpeg", substack:"", behance:"" },

  { id:"wilaya", number:"I", suit:"QALB — HEART", title:"WILAYA — Belovedness",
    archetype:"Sacred love, divine guardianship, the bond that precedes and exceeds all other bonds.",
    description:`Before you loved, you were beloved. This is the order that matters.
Not earned, not conditional, not contingent on what you have done or failed to do. The belovedness came first — extended before you existed to receive it, waiting in the structure of things for you to arrive and find it already present. This is not sentiment. It is the organizing principle of existence: that what was made was made in love and for love and the love was never the creature's to initiate.

Wilaya is the bond that holds — between the Real and what it made, between the guide and the guided, between those who have recognized each other across every line drawn to separate them. It is love that has jurisdiction. Love that is also a covenant. Love that asks something of you precisely because it thinks you capable of it.

To live in Wilaya is to live as one who knows they are held. Not protected from difficulty — held through it. The difference is everything.

You were beloved before you knew what love was. You have never not been beloved. The work is only remembering.`,
    image:"https://substackcdn.com/image/fetch/$s_!FOpY!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F81e03794-c15b-4e65-ab89-2fb45a10c963_1200x1200.jpeg", substack:"", behance:"" },

  { id:"ukhuwwa", number:"II", suit:"QALB — HEART", title:"UKHUWWA — Kinship",
    archetype:"Partnership, union, meeting of equals.",
    description:`What was revealed at the peak does not stay at the peak between ascended ones. It descends and becomes how we treat each other on the plain.

Ukhuwwa is the integration after the revelation — the understanding that the bond declared between two souls becomes the template for every bond. Not a hierarchy of the chosen but a horizontal spreading of what was shown to be possible: that two people can meet without one diminishing the other, that love and justice can occupy the same gesture, that recognition is itself a form of worship.

This is the kinship that forms in the aftermath of loss, in the circles that survive betrayal, in the rooms where people choose each other across every line that power draws to keep them separate. It does not require ceremony. It requires only that you see the other clearly and refuse to look away.

Ukhuwwa asks not who you were paired with at the beginning — but who you have chosen since. Who you show up for. Who shows up for you. In a world designed to isolate, to choose each other is the oldest form of resistance.

We are each other's evidence.`,
    image:"https://substackcdn.com/image/fetch/$s_!kWwH!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F886d998d-79a9-4cc6-9210-60a2f9876afa_1200x1200.jpeg", substack:"", behance:"" },

  { id:"shukr", number:"III", suit:"QALB — HEART", title:"SHUKR — Gratitude",
    archetype:"Celebration, overflow, the joy that arises when love becomes abundance.",
    description:`There is a gratitude that is not politeness. It is recognition: the sudden full sight of what you have been given, what you were born into, what grew from the meeting of two lights before you arrived to receive it.

This is not the gratitude that manages. It overflows. It becomes the vine, the leaf, the flower that opens at the point where the lights converge — not because it was commanded to but because abundance is simply what happens when love is that complete.

To practice Shukr is to stop taking inventory and start seeing. The tradition you were handed. The names you were taught to love. The line that ran through history refusing to be extinguished so that it could reach you.

You did not earn this. That is the whole point. The gift precedes the receiver and the only adequate response is to let it make you generous in turn — to become, yourself, a leaf on the vine, a node in the transmission, part of what the next generation will one day recognize as the abundance they were born into.

Gratitude is not a feeling. It is a form of sight.
What you have been given is still arriving.`,
    image:"https://substackcdn.com/image/fetch/$s_!-WIz!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F21e1646c-2d5d-4e56-ad08-9bc7e4ffb8bd_1200x1200.jpeg", substack:"", behance:"" },

  { id:"niyya", number:"VII", suit:"QALB — HEART", title:"NIYYA — Direction",
    archetype:"Intention, orientation, the heart's alignment before the act.",
    description:`Before the lips move, the heart has already chosen.
This is the deed that precedes all deeds — the moment the interior orients itself toward what truly is. Everything that follows is the unfolding of this. The act is the surface. The niyya is the depth from which it rises.

The same action, performed from different directions, is not the same act. This is not a legal technicality. It is a description of how reality works — that the inner facing reflects what the outer doing actually is, at the level where things are truly measured. Infinite possibilities float in the field of imagination. The question is which one you are actually facing. Which one your depth is already moving toward before you have admitted it to yourself.

Niyya asks for honest declaration, if it asks for anything at all. Not the direction you intend to intend — the direction you are. The heart knows its own orientation even when the mind has not yet caught up.

Face what you are actually facing. Then move.

The stars above and the depth below are the same world. Direction is what connects them.`,
    image:"https://substackcdn.com/image/fetch/$s_!azET!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F52dd1621-9c20-4230-bab6-503eae5883a8_1200x1200.jpeg", substack:"", behance:"" },

 { id:"mutmainna", number:"X", suit:"QALB — HEART", title:"MUTMAINNA — Pleased and Pleasing",
    archetype:"The soul at rest, completion, the arrived life.",
    description:`There is a peace that is not the absence of what was endured. It is what remains when the enduring is finally, fully done — the soul that has passed through its own fire and arrived somewhere it recognizes as home, because everything that happened made this possible.
Pleased. And known to be pleasing. The mutual satisfaction of the creature and the Real, each recognizing the other, the long distance between them finally closed.
Each leaf carries its own light, even after plucking. No two the same, no one diminished by the others. The fullness here is not singular — it is plural, distributed, the abundance that multiplies by being shared across many rather than concentrated in one. The green field holds all of them in sacrament.
This is what completion feels like from the inside: not arrival at a destination but recognition of a belonging that was always true and is now fully inhabited. The soul does not earn this rest. It becomes ready to receive what was always being offered.
Returned. Recognized. At rest in the green it came from.
Pleased. And pleasing.
Home.`,
    image:"https://substackcdn.com/image/fetch/$s_!EA2b!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd5ee7718-affc-494e-b271-9577fc5cbf4e_1200x1200.jpeg", substack:"", behance:"" },


  { id:"talib", number:"XI", suit:"QALB — HEART", title:"TALIB — Seeker",
    archetype:"Curiosity, emotional openness, bearer of the first vow.",
    description:`A youth rises where others stay seated — answering a call only the heart can hear. The unweathered soul stands, offering himself to a path his inner compass found: not yet understood by men, but already known by love.

Talib is the spring before the river meets its forks — devotion unarmored, faith answering before calculation awakens, before loyalties are contorted for personal gain.

This mirror remembers the moment when innocence becomes allegiance, when the seeker rises not from pride, but from recognition. To stand when others hesitate is the courage of the unbroken heart.

Here, love moves before fear can speak.
Here, loyalty is born in the language of youth.
Here, the first believer rises again.`,
    image:"https://substackcdn.com/image/fetch/$s_!SGdz!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fecaedb2d-b4ce-42cd-ac1f-98fdb385711b_1200x1200.jpeg", substack:"", behance:"" },

  { id:"faris", number:"XII", suit:"QALB — HEART", title:"FARIS — Rider",
    archetype:"Devotion in motion, love that acts before it calculates, what is offered without guarantee of return.",
    description:`There is a love that does not wait for conditions to be met. It simply moves — toward the beloved, toward the cause, toward the thirsty — because movement is its nature and stillness would be the only betrayal. This is not the love that tends its own flame. It is the love that rides out.

The cup is not a promise of arrival. It is the shape devotion takes when it leaves the body.

Faris is the one who knows the cost and goes anyway — not from recklessness but from a clarity so complete that calculation becomes irrelevant. The heart has already decided. The body follows. What looks like sacrifice from the outside is, from the inside, simply the most direct path between love and its object. He does not count the distance. He does not negotiate with the river.

To carry without keeping. To offer without condition. To ride toward what you love even when — especially when — the world has taken every ordinary means of holding it.

The moon does not generate its light. It carries it faithfully across the dark, and the dark is illuminated anyway.

What you offer in love outlasts every hand that tries to stop it.`,
    image:"https://substackcdn.com/image/fetch/$s_!9AcZ!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F4f1d6c87-cd4e-4e48-844c-780446988d0e_1200x1200.jpeg", substack:"", behance:"" },

  { id:"maryam", number:"XIII", suit:"QALB — HEART", title:"MARYAM — Cherished",
    archetype:"Sacred interiority, the sovereignty of the inner life, purity as power not performance.",
    description:`She was provided for before she was asked for anything. This is the order that matters — the cherishing preceded the mission, the election preceded the role, the relationship with the Real was already complete before history came asking.

The world will always try to reduce her to the bearer of what she brought. The womb knows otherwise. What she carried was real, but she was not the vessel — she was the mother. The interior life that sustained the impossible was hers first, built in private, witnessed only by the One who had been present all along.

Purity here is not the absence of the world. It is the presence of something the world cannot touch — a sovereignty so complete it has nothing to prove, nothing to perform, nowhere to be seen in order to be real.

She did not need permission to be what she was. She already was it. Chosen. Cherished.

Maryam does not offer her depths for examination. She offers what flows from them — and only what she chooses, only when she chooses, from a fullness that replenishes itself.

Cherished before chosen. Chosen before asked. Complete before any of it.`,
    image:"https://substackcdn.com/image/fetch/$s_!56e5!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Ffcab88c2-1f10-403c-a95c-d06f456d52a4_1200x1200.jpeg", substack:"", behance:"" },

  { id:"haq", number:"I", suit:"QAWL — WORDS", title:"HAQ — Truth",
    archetype:"Clarity, justice, the courage to name what is real.",
    description:`A sword of light passes through illusion, leaving only what can stand in truth. A seed of light grows in the wounding. Falsehood falls away, and the silenced recover their voice. Here, justice is remembrance: the heart aligning with what cannot be corrupted, and choosing truth even when it costs comfort.`,
    image:"https://substackcdn.com/image/fetch/$s_!QWcs!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Ff84c5698-b15f-47f7-a0e9-9cd23e4651f8_1200x1200.jpeg", substack:"", behance:"" },

  { id:"munaafiqa", number:"II", suit:"QAWL — WORDS", title:"MUNAAFIQA — Hypocrisy",
    archetype:"Resistance, the held position, the refusal to descend from truth.",
    description:`There is a violence that speaks beautifully.

It knows the language of the cause. It arrives at the right moments and is absent at the costly ones. It pledges in public and withdraws in private and calls the distance between them nuance, pragmatism, the complexity of the situation. It has learned that the right words, spoken with conviction, are indistinguishable from the right beliefs — until the moment they are not.

This is not ignorance. Ignorance can be educated. This is the deliberate cultivation of two faces — one for the mirror, one for the world, and the slow forgetting of which one is real.

The split does not announce itself. It accumulates. Each small compromise between what you know and what you say, each performance of allegiance that costs nothing, each silence at the moment when speech would have required something — until the tongue and the heart are no longer acquainted.

The performance cuts both ways. The one who speaks falsely wounds the cause and wounds themselves simultaneously, whether they feel it yet or not. They may even feel safer, for a while.

Examine the distance between what you say and what you do. That distance has a name.`,
    image:"https://substackcdn.com/image/fetch/$s_!WWWt!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F22a74580-d29e-459c-b821-5789cb300c65_1200x1200.jpeg", substack:"", behance:"" },

  { id:"aquila", number:"III", suit:"QAWL — WORDS", title:"AQUILA — Beholding",
    archetype:"The pain of clear sight, truth witnessed and carried, beauty named in the midst of devastation.",
    description:`To see clearly is not a comfort. It is an intellectual cost.
The sharpest mind does not look away from what breaks it. It looks through — past the devastation, past the theft, past the court of the one who caused it — and names what it finds on the other side. Not consolation. Truth.

This is the sword that cuts both ways: the same faculty that perceives suffering perceives its meaning. To withhold that meaning from power is the most political act available to the witness. She walked into the throne room and turned it into a pulpit by simply saying what she saw.

I saw nothing but beauty.

The grief was real. The black was real. The pearl at the center did not go out. And the throne that could not survive being seen clearly fell anyway.`,
    image:"https://substackcdn.com/image/fetch/$s_!_-JK!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F5b4876c7-150e-4347-8768-1eb7a2528e43_1200x1200.jpeg", substack:"", behance:"" },

  { id:"shahada", number:"X", suit:"QAWL — WORDS", title:"SHAHADA — Testimony",
    archetype:"Devastation, betrayal, tragic endings.",
    description:`The sky falls through the body in seventy-two lights.
What pierces also reveals.

Each wound becomes a star,
each ending is a testimony:
truth survives the blade meant to silence it.

To witness is to let illusion die.
To fall for justice is to rise in light.

And where the self is undone,
only what is real remains.`,
    image:"https://substackcdn.com/image/fetch/$s_!R-X-!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F498466ff-8364-466a-b839-ac326a52120b_1200x1200.jpeg", substack:"", behance:"" },

  { id:"qasim", number:"XI", suit:"QAWL — WORDS", title:"QASIM — Attributor",
    archetype:"The clear-eyed young, the one who names true value, recognition before the cost is paid.",
    description:`There is a kind of knowing that arrives before experience confirms it — clarity, the sudden sight of what things are actually worth before the world has finished telling you what to value. The attributor does not distribute evenly. He names precisely. This is worth everything. This is worth nothing. The sweetness and the end are not opposites here — they are the same thing seen clearly from a place fear has not yet reached.

Youth is not the absence of understanding. Sometimes it is understanding before compromise arrives to complicate it. The young one stands at the edge of what will cost everything and calls it sweet — not from ignorance but from a sight so clean it has not yet learned to flinch.

Qasim does not yet know what the elders endure or what the oppressors demand — but he knows what is true. And knowing is always where resistance begins.

Death sweeter than honey. The one who said this was not yet twenty. He had simply seen clearly enough to name it.`,
    image:"https://substackcdn.com/image/fetch/$s_!6qT5!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F6c3ff359-0de2-4aad-8754-0e567b84b038_1200x1200.jpeg", substack:"", behance:"" },

  { id:"mujahid", number:"XII", suit:"QAWL — WORDS", title:"MUJAHID — Striver",
    archetype:"The revolutionary rupture, the power of the defenseless, the truth that cuts through the void.",
    description:`The smallest point carries the sharpest truth. Not because it was armed, but because it could not be argued with — thirst has no ideology, innocence no counter-argument. The empire that meets this is already undone; it simply hasn't realized yet.

This is not the fighter who chose the field. This is the one carried into it — whose presence was the final plea and whose blood became the ink history could not erase. Power here moves in one direction only: it descends into the earth and becomes root. What was offered and refused does not disappear. It grows.

The wound is not where the story ends, it is the root underground. What cannot be silenced was never asking for permission to speak.`,
    image:"https://substackcdn.com/image/fetch/$s_!GM9Z!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fcba934ac-d9d2-47d7-a635-cd2c20eb086b_1200x1200.jpeg", substack:"", behance:"" },

  { id:"fajr", number:"I", suit:"NAAR — FIRE", title:"FAJR — Dawn",
    archetype:"Ignition, awakening, the fire that rises after darkness.",
    description:`Night breaks, and the first light enters the fasting body like a hidden flame. Dawn carries both wound and beginning — the hour when the Friend of God returned to his Lord, and the world learned that blood spilled for justice becomes light. Hunger becomes awakening, grief becomes fire, and from sacrifice the day is born. Every fast begins where darkness ends, and the soul rises again toward light.`,
    image:"https://substackcdn.com/image/fetch/$s_!jvg8!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F871b4785-b22d-4b23-877a-e8e92df28345_1200x1200.jpeg", substack:"", behance:"" },

  { id:"zuhoor", number:"III", suit:"NAAR — FIRE", title:"ZUHOOR — Arrival",
    archetype:"The return that was promised, the light that was always warming, the moment the waiting becomes.",
    description:`There is a fire that has been gathering since the first injustice. Not rage — direction. The kind of heat that knows exactly where it is going and has never stopped moving toward it.

Zuhoor is not surprise. It is the fulfillment of a logic that was always in the world, moving beneath every act of resistance, every preserved truth, every generation that refused to let the memory die. The arrival was seeded in the departure. The return was written into the exile.

What comes is not vengeance. It is completion — the long arc of justice finally closing into a circle, the scattered light gathering back into the source that sent it.

You do not wait for Zuhoor passively. You become the conditions that call it. Every act of truth-telling, every refusal to normalize injustice, every seed planted underground is already the arrival beginning.

The light was never absent. It was becoming.`,
    image:"https://substackcdn.com/image/fetch/$s_!Xmyj!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F8a9a20a7-999b-4dd1-b116-e4ba5d35efbe_1200x1200.jpeg", substack:"", behance:"" },

  { id:"eid", number:"IV", suit:"NAAR — FIRE", title:"EID — Felicity",
    archetype:"Sacred celebration, collective joy, the blessing that descends into the body of the community.",
    description:`There is a joy that arrives from above and is received with open arms. Not earned by striving — given, descended, placed into hands already worthy of receiving it.

The water appears at the infant's feet. The fruit falls out of season. The sacred house opens its walls. The garments descend from heaven. In every case the provision does not wait for the asking — it arrives because what was being held was already known, already seen, already beloved enough to be met with abundance.

The garment of honor is not ornament. It is recognition — the beloved named, clothed, sent into the world wearing the proof of what they are. To dress someone in light is to say: I see you. I have always seen you. Wear this so the world sees what I see.

Felicity is the community gathered in the knowledge that they are held. That the line continues. Eid is not forgetting — it is the refusal to let grief be the only truth.

The robes descend. The spring rises. The heart opens.
We are still here. Celebrate as if it is true. It is true.`,
    image:"https://substackcdn.com/image/fetch/$s_!5jfw!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F665ec072-d978-4ab9-b769-8d906afe6748_1200x1200.jpeg", substack:"", behance:"" },

  { id:"fitna", number:"V", suit:"NAAR — FIRE", title:"FITNA — Trial",
    archetype:"The Great Test, the heat of the dialectic, the heart's smelting.",
    description:`The fire that once gave light now tests the limits of what holds it. In the crowded darkness of the struggle, the ego rises to claim the banner. This is the narrow pass of the witness: where the movement is pruned of its pretenses and the soul is stripped of its masks.

Fitna appears not to extinguish the light, but to elucidate what works in the dark to limit it. Only what is centered in Reality survives the furnace.`,
    image:"https://substackcdn.com/image/fetch/$s_!XRSz!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F5522e347-ee14-4cf8-a2b8-b2b335fabffb_1200x1200.jpeg", substack:"", behance:"" },

  { id:"qiyam", number:"VII", suit:"NAAR — FIRE", title:"QIYAM — Standing",
    archetype:"Resistance, the held position, the refusal to descend from truth.",
    description:`The body that will not move has already decided something the mind is still catching up to.
Standing is not the absence of fear. It is fear metabolized into position — the moment the soul plants itself in what is true and discovers that being outnumbered is not the same as being wrong. The ground beneath does not care about the odds. It holds.
Qiyam is the word for prayer and the word for uprising because the tradition understood these as one gesture — the body oriented toward what is real, refusing to bend toward what is false regardless of what it costs to remain upright. Worship and resistance emerge from the same posture.
To stand when everything pressures you to sit is already the act. You do not need to win from standing. You need to stand. History has a long memory for those who held the line when holding was the only honest response available.
The high ground is not arrogance. It is clarity about what you will not compromise — and the willingness to be visible in that refusal.
Something in the human being was made for this. The spine knows.
Stand where you are. Let them come.`,
    image:"https://substackcdn.com/image/fetch/$s_!vYNS!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F6b9e7c9f-028d-4f77-a2ed-b52e1629ad44_1200x1200.jpeg", substack:"", behance:"" },

  { id:"tawakkul", number:"IX", suit:"NAAR — FIRE", title:"TAWAKKUL — Trust",
    archetype:"Resilience, last stand, endurance.",
    description:`When the work is beyond us, the stance itself becomes prayer. You do not hold the standard — it holds you. In the dark, reliance is not softness but the only architecture that doesn't collapse. The distance between you and the light is exactly where trust begins. Surrender and resistance become indistinguishable.

Choose the winning side.`,
    image:"https://substackcdn.com/image/fetch/$s_!_ihn!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F739fcfeb-e087-4acb-99ca-f304daf544fa_1200x1200.jpeg", substack:"", behance:"" },

  { id:"mubashir", number:"XI", suit:"NAAR — FIRE", title:"MUBASHIR — Bearer of Good News",
    archetype:"Renewal, inheritance of light, courage returning to the world.",
    description:`Light does not travel alone. It passes between hearts, doubles in the passing, and what is nearly extinguished blooms where it was cut.

Two paths, one source. One who endured what could not be fought. One who rode toward what could not be survived. Together they carry the same news: that truth does not require a single form of courage, only that courage continue — in patience, in motion, in whatever shape the moment demands.

This is the archetype of inheritance that refuses to become legacy — something sealed, completed, safe behind glass. It stays alive. It keeps moving through the living, and the living carry it forward, a challenge to death itself.

The good news is not that suffering ended. It is that the light found the next heart anyway.`,
    image:"https://substackcdn.com/image/fetch/$s_!pTj6!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Feee69ec0-c221-43ed-8cd5-2b43cef09fe7_1200x1200.jpeg", substack:"", behance:"" },

  { id:"ghalib", number:"XII", suit:"NAAR — FIRE", title:"GHALIB — Victorious",
    archetype:"The unstoppable spirit, fire that moves faster than the walls built to contain it, victory that doesn't ask permission.",
    description:`There is a force that cannot be defeated because it does not fight on the terms offered. It simply moves — through, past, beyond — and the structures built to stop it discover they were always temporary and it was always not.

This is not the victory of the stronger army. It is the victory of the thing that refuses to accept the definition of defeat handed to it. The flame doesn't negotiate with the wind. It uses it.

Ghalib is the one who has already won in the register that matters — not the register of thrones and documents and the official record, but the register of what actually persists, what people actually remember, what turns out to have been the direction history was moving all along.

To move with this archetype is to stop asking whether the world is ready for what you carry. It isn't. Go anyway.

The fire doesn't announce itself. It arrives.
What cannot be extinguished has already won. It simply hasn't finished moving yet.`,
    image:"https://substackcdn.com/image/fetch/$s_!LFSl!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F94f7f897-fab4-4e98-b740-8e7c611f7cca_1200x1200.jpeg", substack:"", behance:"" },

  { id:"zuleikha", number:"XIII", suit:"NAAR — FIRE", title:"ZULEIKHA — Desired",
    archetype:"Passion as liberation, desire that burns the desirer into the Desired.",
    description:`There is a kind of wanting that the respectable traditions have always tried to domesticate — soften into devotion, redirect into duty, pathologize into obsession. Zuleikha refuses all three exits. She stays in the fire, not for destruction but refinement: the burning away of everything that wanted for the wrong reasons until only passion remains, unbound to self.

She does not perform warmth — she radiates it, indifferently, the way the sun does not select its recipients. Her power is not strategic. It does not calculate. It simply will not be extinguished, and this is threatening in a way that cold authority never is, because you cannot negotiate with a flame about its nature.

Between the self that grasps and the spirit that moves, desire is not a private malfunction. It is orientation. The question is not whether to want but what the wanting is for — and whether you are willing to let it remake you rather than remaining intact and hollow.

Power that costs nothing changes nothing. The flame burns away illusion.`,
    image:"https://substackcdn.com/image/fetch/$s_!vSj0!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fed2d3fcf-9957-4a17-91ae-f052a96dd4ec_1200x1200.jpeg", substack:"", behance:"" },

  { id:"jamila", number:"III", suit:"ARD — MATERIAL", title:"JAMILA — Beautiful",
    archetype:"Collaboration, skill recognized, beauty in service.",
    description:`Beauty is the collective work that stands when scaffolding falls. The question is not skill but allegiance.

Surface breaks red: flags rise in intention, alliances churn. The wave calls itself ocean, elevation calls itself truth. Left arrives claiming right. Glow is wrapped around gathering dark.

She rode adorned, crowned in coalition, and left ash.

Below, in the water's honest mirror — black cloth holds green light steady. Right arrives from left, support finding its axis without announcement. To stand where everything burned and say I have never seen anything but beauty — not denial but recognition. When ornament strips away, form reveals itself.

The camel passes. The standard roots.

Jamila doesn't ask what you've built together — it asks what remains when your collective fractures.`,
    image:"https://substackcdn.com/image/fetch/$s_!K8Bv!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F8f2acb41-9e66-4228-afa4-137802679922_1200x1200.jpeg", substack:"", behance:"" },

  { id:"khilafa", number:"IV", suit:"ARD — MATERIAL", title:"KHILAFA — Stewardship",
    archetype:"Control, security, possession — the impulse to hold rather than allow.",
    description:`How do you hold this? Focused on blue illusory perception or taught letters, you might count four diamonds and miss the point. Righted, in true gold: you see what was stolen, who died protecting it, what grows despite. Three dark structures obstruct the path. Seventy-two stand against — eighteen of blood, two of utmost love, fifty-four divine witnesses. The line survives and flowers, 11 quenched times with one green awaited. Life grows around what refuses light. The dot under the ب is Father of Dirt for a Nur Muhammadan and Mudhammatan. Fadak is not metaphor. Moses was asked "What is in your right hand?" Not a staff here, rather a familiar organic spiral, ع 🌀♾️🕉️ Which way is up? Ask seeds sprouting underground. Watch flames rise.`,
    image:"https://substackcdn.com/image/fetch/$s_!I0l5!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F015d9f95-6aef-4dde-b47c-f6d5974551d3_1200x1200.jpeg", substack:"", behance:"" },

  { id:"sajada", number:"V", suit:"ARD — MATERIAL", title:"SAJADA — Contact",
    archetype:"Collapse of false elevation, enforced proximity, currents move where striving cannot, dust as witness.",

what lowers becomes conduit.

    image:"https://substackcdn.com/image/fetch/$s_!oL9_!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd07c0197-f97c-4a1f-9125-bc6493515c10_1200x1200.jpeg", substack:"", behance:"" },

  { id:"sadaqa", number:"VI", suit:"ARD — MATERIAL", title:"SADAQA — Charity",
    archetype:"Generosity, circulation, reciprocity.",
    description:`Wealth does not exalt in being held — it sanctifies in motion. The river cleanses by flowing, this is older than currency. What multiplies is what moves through you, not what you keep. What withers is where that stops.

Six petals hold against fertile earth — the boundary is not the flower but your ability. Heritage means responsibility to circulate not right to hoard. Light presses against limitation; only the will decides if it's contained or released.

Sadaqa is not charity extended downward — it's the recognition that you are riverbed, not river. What flows through purifies. What you hoard becomes the black line that keeps heaven small enough to count.

You do not own the light. You are what it illuminates on its way through.`,
    image:"https://substackcdn.com/image/fetch/$s_!I23i!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F4d554e83-4ea3-40fc-8091-978c8e378a3d_1200x1200.jpeg", substack:"", behance:"" },

  { id:"kamala", number:"VIII", suit:"ARD — MATERIAL", title:"KAMALA — Perfected",
    archetype:"Mastery, development, dedication to craft.",
    description:`To be Perfect is to hold all ninety-nine attributes, not as title collection but as lived integration, actively blooming. Perfection here is not flawlessness achieved through denial of matter; it is the red lotus, roots deep in earth's limitation, petals holding heaven's light without contradiction. Each golden point is a Name made manifest, a quality embodied, the infinite refracted through the particular without loss.

Mastery is not domination of craft but surrender to its demands until the self disappears and only the work remains — devotion so complete it becomes indistinguishable from grace. Eight petals radiate from stillness: electron orbitals, dedication meeting divine completion, the finite body housing infinite capacity. You do not become perfect by transcending the material, but growing from it.

The lotus doesn't escape the mud — it proves what mud was always capable of holding.`,
    image:"https://substackcdn.com/image/fetch/$s_!zYr5!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F1e31b50f-a150-4054-9946-a2b5133e0868_1200x1200.jpeg", substack:"", behance:"" },

{ id:"fadak", number:"IX", suit:"ARD — MATERIAL", title:"FADAK — Still Owed",
    archetype:"Sovereign abundance, rightful inheritance, what belongs to you by divine gift.",
    description:`There is a garden that was given directly. Not earned, not negotiated — given, named, witnessed. And then a court convened to decide what a woman could be allowed to hold.

The abundance is real. The title is clean. The theft is documented. These three things exist simultaneously and the third does not cancel the first two — it only reveals what power fears when a woman stands in her own inheritance, sufficient, requiring nothing from those who would prefer she did.

She made the argument publicly. It was sound. The refusal was not legal but political, which is a distinction history made very carefully and then buried.

What belongs to you in the order of truth does not stop belonging to you because a court looked away. Sovereignty withheld is still sovereignty. The garden grows without their permission. The debt sits on a ledger that does not falsify.

This card does not promise return. It promises something harder to take: that what is yours in truth remains yours in truth, and that the refusal to recognize it is the thief's problem to carry, not yours.

Still owed. Still hers. Still waiting — not in defeat but in the patience of something that knows exactly what it is worth.`,
    image:"https://substackcdn.com/image/fetch/$s_!_IPk!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F896db23f-7363-4758-aa6b-45c793ea7726_1200x1200.jpeg", substack:"", behance:"" },

 { id:"insaan", number:"XI", suit:"ARD — MATERIAL", title:"INSAAN — Sentient",
    archetype:"The human trust, consciousness in matter, the creature who was asked to hold the teachings.",
    description:`Before the first script there was the first mark pressed into earth — not by the strongest creature, not the fastest, but the one that could hold, make, mark, and offer. The one that could raise a standard or form a fist or press against stone and say: I was here. This is enough. This has always been enough.

  { id:"amin", number:"XII", suit:"ARD — MATERIAL", title:"AMIN — Trustworthy",

];

const SYMBOLS = ['◈','⊕','◉','⊗','◎','⊘','◌','⊙','✦','⊛','◍','⊜'];
const sym = i => SYMBOLS[i % SYMBOLS.length];
let drawCount = 1;

function buildSuitNav() {
  const nav = document.getElementById('suitNav');
  SUITS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'suit-btn'; b.dataset.suit = s; b.textContent = s; nav.appendChild(b);
  });
  nav.addEventListener('click', e => {
    if (!e.target.matches('.suit-btn')) return;
    nav.querySelectorAll('.suit-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    document.querySelectorAll('.card-wrap').forEach(c => {
      c.classList.toggle('hidden', e.target.dataset.suit !== 'all' && c.dataset.suit !== e.target.dataset.suit);
    });
  });
}

function buildDeck() {
  const deck = document.getElementById('deck');
  CARDS.forEach((card, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap'; wrap.dataset.suit = card.suit; wrap.style.animationDelay = `${i*0.03}s`;
    const imgF = card.image ? `<img src="${card.image}" alt="${card.title}" loading="lazy">` : `<div class="ph">${sym(i)}</div>`;
    wrap.innerHTML = `<div class="card-inner">
      <div class="card-face">
        <div class="card-image">${imgF}</div>
        <div class="card-label">
          <span class="card-number">${card.number}</span>
          <span class="card-title">${card.title}</span>
          <span class="card-suit">${card.suit}</span>
        </div>
      </div>
      <div class="card-back">
        <div class="back-title">${card.title}</div>
        <div class="back-text">${card.description.slice(0,220)}${card.description.length>220?'…':''}</div>
        ${card.substack?`<a class="back-read" href="${card.substack}" target="_blank">read full ↗</a>`:''}
      </div>
    </div>`;
    wrap.addEventListener('click', () => openModal(card, i));
    deck.appendChild(wrap);
  });
}

document.getElementById('countBtns').addEventListener('click', e => {
  if (!e.target.matches('.count-btn')) return;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  drawCount = parseInt(e.target.dataset.n);
});

document.getElementById('drawBtn').addEventListener('click', () => {
  const n = Math.min(drawCount, CARDS.length);
  const drawn = [...CARDS].sort(() => Math.random()-0.5).slice(0, n);
  const labels = {1:'single draw',3:'three-card draw',5:'five-card spread',7:'seven-card spread',9:'nine-card spread'};
  document.getElementById('spreadTitle').textContent = `✦ ${labels[n]||n+'-card spread'} ✦`;
  const grid = document.getElementById('spreadGrid');
  grid.innerHTML = '';
  drawn.forEach((card, i) => {
    const idx = CARDS.indexOf(card);
    const el = document.createElement('div');
    el.className = 'spread-card'; el.style.animationDelay = `${i*0.1}s`;
    const imgH = card.image ? `<img src="${card.image}" alt="${card.title}">` : `<div class="spread-card-ph">${sym(idx)}</div>`;
    el.innerHTML = `<div class="spread-card-img">${imgH}</div>
      <div class="spread-card-name">${card.title}</div>
      <div class="spread-card-suit">${card.suit}</div>`;
    el.addEventListener('click', () => openModal(card, idx));
    grid.appendChild(el);
  });
  const zone = document.getElementById('spreadZone');
  zone.classList.add('visible');
  zone.scrollIntoView({behavior:'smooth', block:'start'});
});

document.getElementById('clearSpread').addEventListener('click', () =>
  document.getElementById('spreadZone').classList.remove('visible'));

function openModal(card, i) {
  document.getElementById('modalImg').innerHTML = card.image
    ? `<img src="${card.image}" alt="${card.title}">`
    : `<div class="ph" style="min-height:317px;font-size:5rem">${sym(i)}</div>`;
  document.getElementById('modalMeta').textContent = `${card.suit} · ${card.number}`;
  document.getElementById('modalTitle').textContent = card.title;
  document.getElementById('modalSuit').textContent = card.suit;
  document.getElementById('modalArchetype').textContent = card.archetype;
  document.getElementById('modalDesc').textContent = card.description;
  const links = document.getElementById('modalLinks');
  links.innerHTML = '';
  if (card.substack) links.innerHTML += `<a href="${card.substack}" target="_blank">↗ Substack</a>`;
  if (card.behance)  links.innerHTML += `<a href="${card.behance}"  target="_blank">↗ Behance</a>`;
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('closeBtn').addEventListener('click', () =>
  document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key==='Escape') document.getElementById('modalOverlay').classList.remove('open');
});

buildSuitNav();
buildDeck();
</script>
</body>
